email: dilarayildirim@hacettepe.edu.tr
url: https://yldrmdilara.github.io/dilarayildirim.github.io/
description: "Personal website and portfolio of Dilara Yıldırım. Passionate about quantum optics and photonic systems."
keywords: "your keywords, separated by commas"
skills: "Physicist"
